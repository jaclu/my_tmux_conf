#!/usr/bin/env bash
# This is sourced. Fake bang-path to help editors and linters
# shellcheck disable=SC2034  # don't warn about unused variables
# shellcheck disable=SC2154  # don't warn about unassigned variables

if [[ -f /etc/debian_version ]] && grep -q 10 /etc/debian_version; then
    # the older versions here gives false positives
    skip_linters+=(
        codespell
        pylint
    )
fi

skip_linters+=(
    ansible-lint # not needed here
    # checkbashisms
    # vulture
    isort       # 98
    ruff-format # 97
    black       # 96
    flake8      # 86
    # ruff        # 85

    pycodestyle # 70
    pyflakes    # 60
    mypy        # 50
    pyright     # 35
    vulture     # 25
    bandit      # 20 <-----
    pylint      # 10
)

#
#  Handling what files should be skipped by olint
#

excluded_prefixes+=(
    # tmux_conf/dead/code
    stuff/dead_code.py
)

# Explicit excludes, give entire filepath as listed by olint
excludes+=(
    # not my file, works, but not linting complete
    stuff/color_tests/24-bit-color.sh

    # exclude files with no linters, to prevent proj linters if no actual changes
    .bandit
    .destination
    .editorconfig
    .flake8
    .gitignore
    .prettierignore
    tmux_conf/py.typed
    setup.cfg
    stuff/speical-chars-esc-sequences-and-similar.txt
    stuff/color_tests/24bitcolor
    stuff/bind_tests/menus-test.conf
    stuff/bind_tests/bind_test.conf
    stuff/bind_tests/bind-clear-default_keys.conf
    LICENSE
)

# Explicit excludes, give entire filepath as listed by olint
excludes+=(
    .pylintrc
)

project_linters+=(
    # The commented numbers for linters is execution order within a given file type

    # keeping one fast as a per file linter makes sense to get
    # early aborts, the following once  are handled below,
    # using "secondary" as project linters, depending on what is found
    # ---  python linters  ---
    # ---  markdown linters  ---
    # markdownlint-cli2 # 70
    # pymarkdown # 70

    # ---  python linters  ---
    # isort       # 98
    # ruff-format # 97
    # black       # 96
    # flake8      # 86
    # ruff        # 85
    # pycodestyle # 70
    # pyflakes    # 60
    # mypy        # 50
    # pyright     # 35
    # vulture     # 25
    # bandit      # 20
    # pylint      # 10
)

# Use slower linters as proj linters, if faster linter available
# Doesn't matter if it is available or not
# main thing is only run one linter per file, and choose the quickest
if command -v ruff >/dev/null; then
    project_linters+=(
        black
        flake8
    )
elif command -v black >/dev/null; then
    project_linters+=(
        flake8
    )
fi

if command -v markdownlint-cli2 >/dev/null; then
    project_linters+=(pymarkdown)
fi

# Avioid getting codespell error for THIRDPARTY in pyproject.toml
override_linter_cmd["codespell"]="codespell -H -S './.git,./.venv,./.mypy_cache' -L THIRDPARTY"
override_linter_cmd["bandit"]="bandit --exclude './tools/dead-code,./.venv' -r ."
override_linter_cmd["vulture"]="vulture --min-confidence 80 . whitelist.py"
# Force proj linters to always run
# b_changed_file_found=true
